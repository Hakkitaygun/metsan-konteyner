<!DOCTYPE html>
<html lang="tr">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0RG6ZM8NDV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0RG6ZM8NDV');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metsan Konteyner – Sağlam ve Hızlı Çözümler</title>
  
  <meta name="description" content="Metsan Konteyner - İhtiyacınıza uygun sıfır ve ikinci el yük, ofis ve yaşam konteynerleri. Türkiye'nin her yerine güvenli teslimat.">
  <meta property="og:title" content="Metsan Konteyner – Sağlam ve Hızlı Çözümler">
  <meta property="og:description" content="Sıfır ve ikinci el konteyner satış & kiralama hizmetleri. Fiyat teklifi almak için hemen tıklayın.">
  
  <meta property="og:image" content="https://hakkitaygun.github.io/metsan-konteyner/logo.png"> 
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#F97316"> 

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Teko:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-light: #F8FAFC; --white: #FFFFFF;
      --steel-dark: #0F172A; --steel-mid: #1E293B; --steel-light: #334155;
      --orange: #F97316; --orange-hover: #EA580C;
      --text-main: #334155; --text-muted: #64748B; --border: #E2E8F0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-main); overflow-x: hidden; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 4rem; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-bottom: 3px solid var(--orange); }
    
    /* Logo Alanı Düzenlemesi */
    .header-logo { height: 60px; width: auto; object-fit: contain; }
    
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 0.9rem; font-weight: 600; text-transform: uppercase; text-decoration: none; color: #CBD5E1; transition: color 0.2s; }
    .nav-links a:hover { color: var(--orange); }
    .nav-cta { background: var(--orange); color: var(--white); padding: 0.6rem 1.4rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; text-decoration: none; transition: background 0.2s; }
    .nav-cta:hover { background: var(--orange-hover); }

    .hero { min-height: 100vh; display: flex; align-items: center; padding: 80px 4rem 0; background: var(--steel-dark); position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; right: -10%; top: 0; width: 50%; height: 100%; background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,0.03) 20px, rgba(255,255,255,0.03) 40px); transform: skewX(-15deg); }
    .hero-content { max-width: 650px; position: relative; z-index: 1; }
    .hero-tag { display: inline-block; background: rgba(249, 115, 22, 0.2); color: var(--orange); padding: 4px 12px; border-radius: 4px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 1.5rem; border: 1px solid rgba(249, 115, 22, 0.4); }
    .hero-title { font-family: 'Teko', sans-serif; font-size: 5rem; font-weight: 700; line-height: 0.9; color: var(--white); margin-bottom: 1.5rem; text-transform: uppercase; }
    .hero-title span { color: var(--orange); }
    .hero-desc { font-size: 1.1rem; line-height: 1.6; color: #94A3B8; margin-bottom: 2.5rem; }
    
    section { padding: 6rem 4rem; }
    .section-label { color: var(--orange); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .section-title { font-family: 'Teko', sans-serif; font-size: 3.5rem; font-weight: 700; color: var(--steel-dark); line-height: 1; margin-bottom: 1rem; text-transform: uppercase; }
    
    /* FİLTRELEME BUTONLARI CSS */
    .filter-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
    .filter-btn { background: transparent; border: 2px solid var(--border); color: var(--text-muted); padding: 0.6rem 1.2rem; border-radius: 30px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
    .filter-btn.active { background: var(--orange); border-color: var(--orange); color: var(--white); }

    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
    .product-card { background: var(--white); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; transition: all 0.3s; display: flex; flex-direction: column; cursor: pointer; }
    .product-img { height: 220px; background: #E2E8F0; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-badge { position: absolute; top: 12px; right: 12px; background: var(--steel-dark); color: var(--white); font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; }
    .product-body { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
    .product-cat { color: var(--orange); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.3rem; }
    .product-name { font-size: 1.25rem; font-weight: 800; color: var(--steel-dark); margin-bottom: 0.5rem; }
    .product-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1.5rem; flex-grow: 1; }
    
    .product-footer { display: flex; align-items: center; justify-content: space-between; gap: 1rem; width: 100%; }
    .product-price { font-family: 'Inter', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--orange); white-space: nowrap; }
    .product-order { background: var(--steel-light); color: var(--white); padding: 0.8rem; text-align: center; border-radius: 4px; font-weight: 600; text-decoration: none; flex: 1; transition: background 0.2s; }
    .product-order:hover { background: var(--orange); }

    .c-modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 2rem; backdrop-filter: blur(5px); }
    .c-modal-overlay.open { display: flex; }
    .c-modal-box { background: var(--white); border-radius: 8px; width: 100%; max-width: 900px; max-height: 90vh; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; position: relative; }
    .c-modal-close { position: absolute; top: 1rem; right: 1rem; background: var(--bg-light); border: 1px solid var(--border); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; z-index: 10; display:flex; align-items:center; justify-content:center;}
    
    .c-modal-info { padding: 2.5rem; display: flex; flex-direction: column; overflow-y: auto; height: 100%; max-height: 90vh; }
    .c-modal-info::-webkit-scrollbar { width: 6px; }
    .c-modal-info::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 8px; }

    .c-modal-cat { color: var(--orange); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.5rem; }
    .c-modal-name { font-size: 2.2rem; font-weight: 800; color: var(--steel-dark); margin-bottom: 0.5rem; }
    .c-modal-price { font-size: 2rem; font-weight: 700; color: var(--orange); margin-bottom: 1rem; }
    .btn-primary { background: var(--orange); color: var(--white); padding: 1.2rem; border-radius: 4px; font-weight: 700; text-decoration: none; text-align:center; }

    .float-wa { position: fixed; bottom: 2rem; right: 2rem; z-index: 999; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(37,211,102,0.4); }

    @media (max-width: 768px) {
      nav { padding: 1rem; }
      .nav-links { display: none; }
      .hero { padding: 120px 2rem 4rem; }
      .c-modal-box { grid-template-columns: 1fr; overflow-y: auto; }
      .c-modal-info { height: auto; max-height: none; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" style="text-decoration: none;">
    <img src="logo.png" alt="Metsan Logo" class="header-logo">
  </a>
  <ul class="nav-links">
    <li><a href="#urunler">Konteynerler</a></li>
    <li><a href="#iletisim">İletişim</a></li>
  </ul>
  <a href="https://wa.me/905324649334" class="nav-cta" target="_blank">Fiyat Teklifi Al</a>
</nav>

<section class="hero">
  <div class="hero-content">
    <div class="hero-tag">Metsan Mimari Ev Tasarımı</div>
    <h1 class="hero-title">Dünyanın Yükünü<br><span>Hayatın Alanını</span> Taşıyoruz</h1>
    <p class="hero-desc">İhtiyacınıza uygun sıfır ve ikinci el yük, ofis ve yaşam konteynerleri. Türkiye'nin her yerine güvenli teslimat.</p>
  </div>
</section>

<section id="urunler">
  <h2 class="section-title">Ürün Kataloğu</h2>
  
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-btn active" onclick="filterProducts('all', this)">Tümü</button>
    <button class="filter-btn" onclick="filterProducts('Yük Konteyneri', this)">Yük Konteyneri</button>
    <button class="filter-btn" onclick="filterProducts('Ofis Konteyneri', this)">Ofis Konteyneri</button>
    <button class="filter-btn" onclick="filterProducts('Yaşam Konteyneri', this)">Yaşam</button>
    <button class="filter-btn" onclick="filterProducts('Sıfır', this)">Sıfır</button>
    <button class="filter-btn" onclick="filterProducts('İkinci El', this)">İkinci El</button>
  </div>

  <div class="products-grid" id="productsGrid"></div>
</section>

<div class="c-modal-overlay" id="productModal">
  <div class="c-modal-box">
    <button class="c-modal-close" onclick="closeProductDetail()">✕</button>
    <div class="c-modal-gallery" style="background:#F1F5F9; padding:1rem; display:flex; align-items:center;">
      <div id="mMainImgBox" style="width:100%; height:350px;"></div>
    </div>
    <div class="c-modal-info">
      <div class="c-modal-cat" id="mCat"></div>
      <div class="c-modal-price" id="mPrice"></div>
      <div class="c-modal-name" id="mName"></div>
      <div class="c-modal-badge" id="mCondition" style="background:#0F172A; color:white; padding:4px 8px; border-radius:4px; font-size:0.8rem; align-self:flex-start; margin-bottom:1rem;"></div>
      <div class="c-modal-desc" id="mDesc" style="margin-bottom:2rem; line-height:1.6; color:#475569;"></div>
      <a href="#" id="mOrder" class="btn-primary" target="_blank">WhatsApp'tan Sipariş & Bilgi</a>
    </div>
  </div>
</div>

<script>
const WA = '905324649334';
let allProducts = [];

function formatPrice(priceStr) {
  if (!priceStr) return '';
  const num = parseInt(priceStr.replace(/[^0-9]/g, ''));
  if (isNaN(num)) return priceStr; 
  return new Intl.NumberFormat('tr-TR', { style: 'currency', currency: 'TRY', minimumFractionDigits: 0 }).format(num);
}

function productCardHTML(p) {
  const firstImage = (p.images && p.images.length > 0) ? p.images[0] : (p.image ? p.image : null);
  const priceHTML = p.price ? `<div class="product-price">${formatPrice(p.price)}</div>` : '';
  return `
    <div class="product-card" onclick="openProductDetail('${p.id}')">
      <div class="product-img"><img src="${firstImage || ''}" alt="${p.name}"><div class="product-badge">${p.condition}</div></div>
      <div class="product-body">
        <div class="product-cat">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-footer">${priceHTML}<div class="product-order">İncele & Bilgi Al</div></div>
      </div>
    </div>`;
}

function filterProducts(filterVal, btn) {
  if (btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  const activeProds = allProducts.filter(p => p.active !== false);
  let filtered = filterVal === 'all' ? activeProds : activeProds.filter(p => p.category === filterVal || p.condition === filterVal);
  document.getElementById('productsGrid').innerHTML = filtered.map(productCardHTML).join('');
}

async function loadProducts() {
  try {
    const res = await fetch('products.json?t=' + Date.now(), { cache: 'no-store' });
    allProducts = await res.json();
    filterProducts('all');
  } catch(e) { console.error(e); }
}

function openProductDetail(id) {
  const p = allProducts.find(x => x.id === id);
  if(!p) return;
  document.getElementById('mCat').textContent = p.category;
  document.getElementById('mName').textContent = p.name;
  document.getElementById('mCondition').textContent = p.condition;
  document.getElementById('mDesc').textContent = p.desc;
  
  const mPrice = document.getElementById('mPrice');
  const mOrder = document.getElementById('mOrder');
  if(p.price) {
    mPrice.textContent = formatPrice(p.price); mPrice.style.display = 'block';
    mOrder.textContent = "WhatsApp'tan Sipariş & Bilgi";
  } else {
    mPrice.style.display = 'none'; mOrder.textContent = "Bu Ürün İçin Fiyat Al";
  }
  
  const waMsg = encodeURIComponent(`Merhaba, web sitenizdeki "${p.name}" hakkında bilgi almak istiyorum.`);
  mOrder.href = `https://wa.me/${WA}?text=${waMsg}`;
  
  const imgs = p.images || (p.image ? [p.image] : []);
  document.getElementById('mMainImgBox').innerHTML = imgs.length ? `<img src="${imgs[0]}" style="width:100%; height:100%; object-fit:cover; border-radius:6px;">` : 'Görsel Yok';
  document.getElementById('productModal').classList.add('open');
}

function closeProductDetail() { document.getElementById('productModal').classList.remove('open'); }
loadProducts();
</script>
</body>
</html>
